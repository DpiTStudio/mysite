<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ошибка сервера</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a3b);
            color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 2rem 3rem;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            color: #ff6b6b;
        }
        h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        a, button {
            color: #61dafb;
            text-decoration: none;
            font-weight: 600;
            border: 2px solid #61dafb;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: background 0.3s, color 0.3s;
            background: transparent;
            cursor: pointer;
        }
        a:hover, button:hover {
            background: #61dafb;
            color: #1e1e2f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ошибка сервера</h1>
        <h2>500 – Внутренняя ошибка сервера</h2>
        <p>Произошла ошибка сервера. Пожалуйста, обратитесь к администратору.</p>
        <a href="/">На главную</a>
    </div>
</body>
</html>
