<!-- Отзывы -->
{% if recent_reviews %}
<section class="home-section py-5">
    <div class="section-title animate-up text-left mb-5">
        <h2 class="display-5 text-gradient fw-bold mb-3">Отзывы клиентов</h2>
        <p class="text-muted fs-5">Что говорят наши клиенты о сотрудничестве</p>
    </div>
    
    <div class="bento-grid">
        {% for review in recent_reviews %}
        <div class="bento-item {% if forloop.first %}bento-wide{% endif %} animate-up delay-{{ forloop.counter }}00 d-flex flex-column h-100">
            <div class="mb-4 d-flex align-items-center justify-content-between">
                <span class="bg-primary-alpha text-primary rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 48px; height: 48px;">
                    <i class="bi bi-quote fs-3"></i>
                </span>
                <div class="text-warning small">
                    <i class="bi bi-star-fill"></i>
                    <i class="bi bi-star-fill"></i>
                    <i class="bi bi-star-fill"></i>
                    <i class="bi bi-star-fill"></i>
                    <i class="bi bi-star-fill"></i>
                </div>
            </div>
            
            <p class="{% if forloop.first %}fs-5{% else %}small{% endif %} text-muted mb-4 flex-grow-1" style="font-style: italic;">
                "{{ review.content|truncatewords:40 }}"
            </p>
            
            <div class="mt-auto pt-4 border-top border-secondary border-opacity-10 d-flex align-items-center">
                <div class="review-avatar me-3" style="width: 45px; height: 45px; background: var(--gradient-premium); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0;">
                    <i class="bi bi-person-fill fs-5"></i>
                </div>
                <div>
                    <h6 class="mb-0 text-white fw-bold">{{ review.full_name }}</h6>
                    <small class="text-muted small">
                         {{ review.created_at|date:"d M Y" }}
                    </small>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    
    <div class="text-center mt-5 pt-3 animate-up delay-300">
        <a href="{% url 'reviews:list' %}" class="btn btn-outline-primary btn-lg px-5 py-3 rounded-pill fw-medium d-inline-flex align-items-center transition-all">
            Все отзывы 
            <span class="bg-primary text-white rounded-circle ms-3 d-inline-flex align-items-center justify-content-center transition-all btn-icon" style="width: 30px; height: 30px;">
                <i class="bi bi-chevron-right small"></i>
            </span>
        </a>
    </div>
</section>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {% for review in recent_reviews %}
    {
      "@type": "Review",
      "author": {
        "@type": "Person",
        "name": "{{ review.full_name|escapejs }}"
      },
      "datePublished": "{{ review.created_at|date:'c' }}",
      "reviewBody": "{{ review.content|striptags|escapejs }}",
      "itemReviewed": {
        "@type": "Organization",
        "name": "{{ site_settings.site_title|escapejs }}"
      }
    }{% if not forloop.last %},{% endif %}
    {% endfor %}
  ]
}
</script>
{% endif %}
