<!-- Отзывы -->
{% if recent_reviews %}
<section class="home-section py-5">
    <div class="section-title animate-up text-left mb-5">
        <h2 class="display-5 text-gradient fw-bold mb-3">Отзывы клиентов</h2>
        <p class="text-muted fs-5">Что говорят наши клиенты о сотрудничестве</p>
    </div>
    
    <div class="row g-4 justify-content-center">
        {% for review in recent_reviews %}
        <div class="col-12 col-md-6 col-lg-4 animate-up delay-{{ forloop.counter }}00">
            <div class="glass-card-premium p-4 review-card border-0 h-100 d-flex flex-column" style="border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.15);">
                <div class="mb-4 d-flex align-items-center justify-content-between">
                    <span class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 48px; height: 48px;">
                        <i class="bi bi-quote fs-3"></i>
                    </span>
                    <div class="text-warning small">
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-fill"></i>
                    </div>
                </div>
                
                <p class="small text-muted mb-4 flex-grow-1" style="line-height: 1.6; font-style: italic;">
                    "{{ review.content|truncatewords:40 }}"
                </p>
                
                <div class="mt-auto pt-4 border-top border-secondary border-opacity-25 d-flex align-items-center">
                    <div class="review-avatar me-3" style="width: 50px; height: 50px; background: linear-gradient(135deg, var(--bs-primary), var(--bs-info)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.2);">
                        <i class="bi bi-person-fill fs-4"></i>
                    </div>
                    <div>
                        <h6 class="mb-0 text-white fw-bold">{{ review.full_name }}</h6>
                        <small class="text-muted d-flex align-items-center mt-1">
                            <i class="bi bi-calendar3 me-1 small"></i> {{ review.created_at|date:"d M Y" }}
                        </small>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    
    <div class="text-center mt-5 pt-3 animate-up delay-300">
        <a href="{% url 'reviews:list' %}" class="btn btn-outline-primary btn-lg px-5 py-3 rounded-pill fw-medium d-inline-flex align-items-center transition-all">
            Все отзывы 
            <span class="bg-primary text-white rounded-circle ms-3 d-inline-flex align-items-center justify-content-center transition-all btn-icon" style="width: 30px; height: 30px;">
                <i class="bi bi-chevron-right small"></i>
            </span>
        </a>
    </div>
</section>

<style>
    /* Анимации при наведении для карточек отзывов */
    .glass-card-premium { transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .glass-card-premium:hover { transform: translateY(-5px); box-shadow: 0 15px 50px rgba(0,0,0,0.3) !important; }
    
    /* Анимация кнопки */
    .btn-outline-primary:hover .btn-icon { background-color: #fff !important; color: var(--bs-primary) !important; transform: translateX(5px); }
</style>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {% for review in recent_reviews %}
    {
      "@type": "Review",
      "author": {
        "@type": "Person",
        "name": "{{ review.full_name|escapejs }}"
      },
      "datePublished": "{{ review.created_at|date:'c' }}",
      "reviewBody": "{{ review.content|striptags|escapejs }}",
      "itemReviewed": {
        "@type": "Organization",
        "name": "{{ site_settings.site_title|escapejs }}"
      }
    }{% if not forloop.last %},{% endif %}
    {% endfor %}
  ]
}
</script>
{% endif %}
